<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Agentic AI — Reference Architecture v4 (Animated)</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  background: #0f1117;
  min-height: 100vh;
  padding: 24px;
}

/* ── PAGE HEADER ── */
.page-header {
  max-width: 1520px;
  margin: 0 auto 16px auto;
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: 12px;
}
.page-header h1 { font-size: 17px; font-weight: 600; color: #f9fafb; }
.page-header p  { font-size: 11px; color: #6b7280; }

.ctrl-bar {
  display: flex;
  gap: 8px;
  align-items: center;
}
.btn {
  padding: 6px 14px;
  border-radius: 6px;
  border: 1px solid #374151;
  background: #1f2937;
  color: #d1d5db;
  font-size: 11px;
  cursor: pointer;
  transition: all 0.15s;
}
.btn:hover { background: #374151; color: #f9fafb; }
.btn.active { background: #1d4ed8; border-color: #1d4ed8; color: #fff; }

/* ── DIAGRAM CARD ── */
.diagram-card {
  max-width: 1520px;
  margin: 0 auto;
  background: #ffffff;
  border-radius: 12px;
  box-shadow: 0 0 0 1px rgba(255,255,255,0.06), 0 8px 40px rgba(0,0,0,0.4);
  padding: 24px;
  overflow-x: auto;
}

svg.arch { display: block; min-width: 1460px; }

/* ── SVG TEXT ── */
.t-outer { font-size: 13px; font-weight: 500; fill: #4b5563; font-family: inherit; }
.t-sec   { font-size: 10px; font-weight: 600; font-family: inherit; }
.t-grp   { font-size: 9px;  font-weight: 600; font-family: inherit; }
.t-nd    { font-size: 10.5px; font-weight: 500; fill: #111827; font-family: inherit; }
.t-sub   { font-size: 8.5px;  font-weight: 400; fill: #6b7280; font-family: inherit; }
.t-arr   { font-size: 8.5px;  fill: #9ca3af; font-family: inherit; }

/* ── SECTION LABEL COLOURS ── */
.lc-exp   { fill: #534AB7; } .lc-rag   { fill: #0F6E56; }
.lc-agent { fill: #993C1D; } .lc-llm   { fill: #854F0B; }
.lc-data  { fill: #5F5E5A; } .lc-aiops { fill: #3B6D11; }
.lc-ctrl  { fill: #185FA5; } .lc-gov   { fill: #993556; }

/* ── SECTION BG ── */
.bg-exp   { fill: #EEF2FB; stroke: #7F77DD; stroke-width: 0.9; }
.bg-rag   { fill: #E1F5EE; stroke: #1D9E75; stroke-width: 0.9; }
.bg-agent { fill: #FAECE7; stroke: #D85A30; stroke-width: 0.9; }
.bg-llm   { fill: #FAEEDA; stroke: #BA7517; stroke-width: 0.9; }
.bg-data  { fill: #F1EFE8; stroke: #888780; stroke-width: 0.9; }
.bg-aiops { fill: #EAF3DE; stroke: #639922; stroke-width: 0.9; }
.bg-ctrl  { fill: #E6F1FB; stroke: #185FA5; stroke-width: 0.9; }
.bg-gov   { fill: #FBEAF0; stroke: #993556; stroke-width: 0.9; }
.bg-grp   { fill: rgba(255,255,255,0.5); stroke: rgba(0,0,0,0.08); stroke-width: 0.7; }
.outer    { fill: none; stroke: #d1d5db; stroke-width: 1.2; }

/* ── NODES ── */
.n-exp   rect { fill:#fff; stroke:#7F77DD; stroke-width:0.9; }
.n-rag   rect { fill:#fff; stroke:#1D9E75; stroke-width:0.9; }
.n-agent rect { fill:#fff; stroke:#D85A30; stroke-width:0.9; }
.n-llm   rect { fill:#fff; stroke:#BA7517; stroke-width:0.9; }
.n-data  rect { fill:#fff; stroke:#888780; stroke-width:0.9; }
.n-aiops rect { fill:#fff; stroke:#639922; stroke-width:0.9; }
.n-ctrl  rect { fill:#fff; stroke:#185FA5; stroke-width:0.9; }
.n-gov   rect { fill:#fff; stroke:#993556; stroke-width:0.9; }
.n-opt   rect { fill:#fff; stroke:#BA7517; stroke-width:0.9; stroke-dasharray:5 3; }
.opt-tag { font-size:7.5px; font-weight:500; fill:#854F0B; font-family:inherit; }

.ng { cursor: pointer; }
.ng rect { transition: opacity 0.15s, filter 0.15s; }
.ng:hover rect { opacity: 0.78; filter: brightness(0.96); }
.ng:hover .t-nd { fill: #1d4ed8; }

/* ════════════════════════════
   STAGED REVEAL ANIMATION
════════════════════════════ */
.reveal-section {
  opacity: 0;
  transform-origin: center;
  animation: revealIn 0.55s ease-out forwards;
}
@keyframes revealIn {
  from { opacity: 0; transform: translateY(14px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* staggered delays per section */
.reveal-exp    { animation-delay: 0.1s; }
.reveal-rag    { animation-delay: 0.4s; }
.reveal-agent  { animation-delay: 0.55s; }
.reveal-llm    { animation-delay: 0.7s; }
.reveal-data   { animation-delay: 0.9s; }
.reveal-aiops  { animation-delay: 1.1s; }
.reveal-ctrl   { animation-delay: 0.3s; }
.reveal-gov    { animation-delay: 0.5s; }
.reveal-arrows { animation-delay: 1.35s; }
.reveal-legend { animation-delay: 1.5s; }

/* ════════════════════════════
   FLOWING ARROW ANIMATION
   stroke-dasharray on each flow line
════════════════════════════ */

/* Main flow — solid thick purple/grey — animated dash sweep */
.flow-main {
  stroke: #374151;
  stroke-width: 2;
  fill: none;
  stroke-dasharray: 6 0;
}

/* Animated pulse lines — particles travel along path */
.flow-pulse {
  stroke-dasharray: 8 18;
  stroke-dashoffset: 0;
  animation: flowPulse 1.8s linear infinite;
}
.flow-pulse-slow {
  stroke-dasharray: 6 22;
  stroke-dashoffset: 0;
  animation: flowPulse 2.6s linear infinite;
}
.flow-pulse-rag {
  stroke: #1D9E75;
  stroke-width: 1.6;
  fill: none;
  stroke-dasharray: 8 16;
  animation: flowPulse 2s linear infinite;
}
.flow-pulse-feedback {
  stroke: #185FA5;
  stroke-width: 1.2;
  fill: none;
  stroke-dasharray: 6 20;
  animation: flowPulse 2.8s linear infinite reverse;
}
.flow-pulse-aiops {
  stroke: #3B6D11;
  stroke-width: 1;
  fill: none;
  stroke-dasharray: 5 16;
  animation: flowPulse 2.2s linear infinite;
}
.flow-pulse-gov {
  stroke: #993556;
  stroke-width: 1;
  fill: none;
  stroke-dasharray: 4 18;
  animation: flowPulse 3s linear infinite;
}
.flow-pulse-ctrl {
  stroke: #185FA5;
  stroke-width: 1;
  fill: none;
  stroke-dasharray: 4 18;
  animation: flowPulse 2.5s linear infinite;
}

@keyframes flowPulse {
  from { stroke-dashoffset: 0; }
  to   { stroke-dashoffset: -80; }
}

/* ════════════════════════════
   NODE PULSE — key nodes softly pulse
════════════════════════════ */
.node-pulse rect {
  animation: nodePulse 3s ease-in-out infinite;
}
@keyframes nodePulse {
  0%, 100% { filter: brightness(1);   }
  50%       { filter: brightness(0.93) drop-shadow(0 0 4px rgba(83,74,183,0.25)); }
}

.node-pulse-green rect {
  animation: nodePulseGreen 3.4s ease-in-out infinite;
}
@keyframes nodePulseGreen {
  0%, 100% { filter: brightness(1);   }
  50%       { filter: brightness(0.93) drop-shadow(0 0 4px rgba(29,158,117,0.25)); }
}

.node-pulse-amber rect {
  animation: nodePulseAmber 3.8s ease-in-out infinite;
}
@keyframes nodePulseAmber {
  0%, 100% { filter: brightness(1);   }
  50%       { filter: brightness(0.93) drop-shadow(0 0 4px rgba(186,117,23,0.25)); }
}

.node-pulse-coral rect {
  animation: nodePulseCoral 3.2s ease-in-out infinite;
}
@keyframes nodePulseCoral {
  0%, 100% { filter: brightness(1);   }
  50%       { filter: brightness(0.93) drop-shadow(0 0 4px rgba(216,90,48,0.25)); }
}

/* ════════════════════════════
   AIOPS SECTION — scanning highlight
════════════════════════════ */
.aiops-scan {
  fill: none;
  stroke: rgba(99,153,34,0.35);
  stroke-width: 1;
  rx: 5;
  animation: aiScan 4s ease-in-out infinite;
}
@keyframes aiScan {
  0%,100% { opacity: 0;   transform: scaleY(0.8); }
  40%,60% { opacity: 1;   transform: scaleY(1); }
}

/* ════════════════════════════
   SECTION HIGHLIGHT on click
════════════════════════════ */
.section-hl {
  transition: filter 0.25s;
}
.section-dimmed {
  filter: brightness(0.55) saturate(0.3);
  transition: filter 0.25s;
}
.section-active {
  filter: brightness(1.04) drop-shadow(0 0 8px rgba(0,0,0,0.12));
  transition: filter 0.25s;
}

/* ════════════════════════════
   TOOLTIP
════════════════════════════ */
#tooltip {
  position: fixed;
  background: #1f2937;
  color: #f9fafb;
  font-size: 12px;
  padding: 8px 12px;
  border-radius: 7px;
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.15s;
  max-width: 280px;
  line-height: 1.6;
  z-index: 1000;
  border: 1px solid rgba(255,255,255,0.08);
}

/* ── FOOTER ── */
.print-note {
  max-width: 1520px;
  margin: 10px auto 0;
  font-size: 11px;
  color: #4b5563;
  text-align: right;
}

@media (prefers-reduced-motion: reduce) {
  .flow-pulse, .flow-pulse-slow, .flow-pulse-rag,
  .flow-pulse-feedback, .flow-pulse-aiops,
  .flow-pulse-gov, .flow-pulse-ctrl,
  .node-pulse rect, .node-pulse-green rect,
  .node-pulse-amber rect, .node-pulse-coral rect,
  .reveal-section { animation: none !important; opacity: 1 !important; }
}

@media print {
  body { background: white; padding: 0; }
  .diagram-card { box-shadow: none; }
  .ctrl-bar, #tooltip, .print-note { display: none; }
  .reveal-section { opacity: 1 !important; animation: none !important; }
}
</style>
</head>
<body>

<div class="page-header">
  <div>
    <h1>Agentic AI — Reference Architecture v4</h1>
    <p>LLM-native · Cloud-agnostic · Hover nodes for detail · Click sections to focus</p>
  </div>
  <div class="ctrl-bar">
    <button class="btn active" id="btn-anim" onclick="toggleAnim()">⏸ Pause flow</button>
    <button class="btn" id="btn-reset" onclick="resetFocus()">Reset focus</button>
  </div>
</div>

<div class="diagram-card">
<svg class="arch" viewBox="0 0 1460 970" role="img"
     aria-label="Agentic AI Reference Architecture v4 animated">
<title>Agentic AI Reference Architecture v4 — Animated</title>
<desc>Animated LLM-native agentic AI reference architecture with flowing arrows and staged reveal.</desc>
<defs>
  <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <marker id="ar2" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M1 1L8 5L1 9" fill="none" stroke="context-stroke" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <marker id="ar-green" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#1D9E75" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <marker id="ar-blue" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#185FA5" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <marker id="ar-dkgreen" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#3B6D11" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <marker id="ar-pink" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#993556" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<!-- OUTER BOUNDARY -->
<rect class="outer" x="10" y="10" width="1440" height="950" rx="12"/>
<text class="t-outer" x="28" y="32">Agentic AI — Reference Architecture v4</text>

<!-- ══════════════════════════════════════
     ROW 1: EXPERIENCE & ACCESS
══════════════════════════════════════ -->
<g class="reveal-section reveal-exp section-hl" id="sec-exp" onclick="focusSection('exp')">
  <rect class="bg-exp" x="18" y="42" width="1282" height="112" rx="8"/>
  <text class="t-sec lc-exp" x="30" y="58">Experience &amp; access layer</text>

  <g class="ng n-exp node-pulse" data-tip="End users, enterprise apps, and external API consumers that interact with the agentic AI system.">
    <rect x="30" y="66" width="196" height="48" rx="7"/>
    <text class="t-nd" x="128" y="94" text-anchor="middle">End users / enterprise apps</text>
  </g>

  <g class="ng n-exp" data-tip="Interaction channels: Web portal, Mobile app, Chat interfaces, Internal tooling, and API clients.">
    <rect x="272" y="66" width="296" height="48" rx="7"/>
    <text class="t-nd"  x="420" y="84" text-anchor="middle">Channels</text>
    <text class="t-sub" x="420" y="100" text-anchor="middle">Web · Mobile · Chat · Internal tools · API clients</text>
  </g>

  <g class="ng n-exp" data-tip="Central access layer: auth, rate limiting, intelligent routing, and observability hooks. Entry point for all AI system traffic.">
    <rect x="614" y="66" width="330" height="48" rx="7"/>
    <text class="t-nd"  x="779" y="84" text-anchor="middle">API gateway / access layer</text>
    <text class="t-sub" x="779" y="100" text-anchor="middle">Auth · rate limiting · routing · observability hooks</text>
  </g>
</g>

<!-- ══════════════════════════════════════
     ROW 2 COL 1: KNOWLEDGE & RAG
══════════════════════════════════════ -->
<g class="reveal-section reveal-rag section-hl" id="sec-rag" onclick="focusSection('rag')">
  <rect class="bg-rag" x="18" y="180" width="370" height="376" rx="8"/>
  <text class="t-sec lc-rag" x="30" y="197">Knowledge &amp; RAG layer</text>

  <g class="ng n-rag node-pulse-green" data-tip="Ingest structured and unstructured data from internal and external sources — batch and streaming pipelines.">
    <rect x="30" y="206" width="166" height="32" rx="6"/>
    <text class="t-nd" x="113" y="226" text-anchor="middle">Data ingestion</text>
  </g>
  <g class="ng n-rag" data-tip="Split documents into semantically meaningful chunks and encode them using dense and sparse embedding models.">
    <rect x="210" y="206" width="166" height="32" rx="6"/>
    <text class="t-nd" x="293" y="226" text-anchor="middle">Chunking &amp; embedding</text>
  </g>
  <g class="ng n-rag node-pulse-green" data-tip="Store embeddings in a vector DB for ANN retrieval. Optionally layer a knowledge graph for relational context.">
    <rect x="30" y="252" width="166" height="32" rx="6"/>
    <text class="t-nd" x="113" y="272" text-anchor="middle">Vector store / KG</text>
  </g>
  <g class="ng n-rag" data-tip="Track document versions, index snapshots, and lineage metadata so retrieval quality can be traced back to source data.">
    <rect x="210" y="252" width="166" height="32" rx="6"/>
    <text class="t-nd" x="293" y="272" text-anchor="middle">KB versioning &amp; lineage</text>
  </g>

  <rect class="bg-grp" x="30" y="298" width="346" height="112" rx="6"/>
  <text class="t-grp lc-rag" x="40" y="313">Advanced retrieval</text>
  <g class="ng n-rag" data-tip="Combine dense vector search with sparse BM25 retrieval for higher recall and precision.">
    <rect x="40" y="320" width="154" height="28" rx="5"/>
    <text class="t-nd" x="117" y="338" text-anchor="middle">Hybrid search</text>
  </g>
  <g class="ng n-rag" data-tip="Apply a cross-encoder reranker to re-score retrieved chunks before passing to the LLM.">
    <rect x="206" y="320" width="158" height="28" rx="5"/>
    <text class="t-nd" x="285" y="338" text-anchor="middle">Reranking</text>
  </g>
  <g class="ng n-rag" data-tip="Allow the agent to iteratively query the knowledge base, refining retrieval based on intermediate reasoning.">
    <rect x="40" y="360" width="154" height="28" rx="5"/>
    <text class="t-nd" x="117" y="378" text-anchor="middle">Agentic RAG</text>
  </g>
  <g class="ng n-rag" data-tip="HyDE: generate a hypothetical document to improve query embedding. Corrective RAG: verify and re-retrieve when results are poor.">
    <rect x="206" y="360" width="158" height="28" rx="5"/>
    <text class="t-nd" x="285" y="378" text-anchor="middle">HyDE · Corrective RAG</text>
  </g>

  <!-- RAG internal static arrows -->
  <line x1="196" y1="222" x2="208" y2="222" stroke="#1D9E75" stroke-width="0.9" marker-end="url(#ar)"/>
  <line x1="196" y1="268" x2="208" y2="268" stroke="#1D9E75" stroke-width="0.9" marker-end="url(#ar)"/>
  <line x1="113" y1="238" x2="113" y2="250" stroke="#1D9E75" stroke-width="0.9" marker-end="url(#ar)"/>
  <line x1="293" y1="238" x2="293" y2="250" stroke="#1D9E75" stroke-width="0.9" marker-end="url(#ar)"/>
  <line x1="203" y1="268" x2="203" y2="296" stroke="#1D9E75" stroke-width="0.9" marker-end="url(#ar)"/>
</g>

<!-- ══════════════════════════════════════
     ROW 2 COL 2: AGENT SYSTEM
══════════════════════════════════════ -->
<g class="reveal-section reveal-agent section-hl" id="sec-agent" onclick="focusSection('agent')">
  <rect class="bg-agent" x="398" y="180" width="430" height="376" rx="8"/>
  <text class="t-sec lc-agent" x="410" y="197">Agent system — data plane</text>

  <g class="ng n-agent node-pulse-coral" data-tip="Receives the user goal, decomposes it into sub-tasks, and drives the ReAct reasoning loop: Reason → Act → Observe → Repeat.">
    <rect x="410" y="206" width="196" height="44" rx="6"/>
    <text class="t-nd"  x="508" y="224" text-anchor="middle">Planner agent</text>
    <text class="t-sub" x="508" y="239" text-anchor="middle">Task decomp · ReAct loop</text>
  </g>
  <g class="ng n-agent node-pulse-coral" data-tip="Specialist worker agents: call tools, query RAG, run code, or invoke external APIs.">
    <rect x="618" y="206" width="196" height="44" rx="6"/>
    <text class="t-nd"  x="716" y="224" text-anchor="middle">Executor agents</text>
    <text class="t-sub" x="716" y="239" text-anchor="middle">Specialist workers · tool calls</text>
  </g>

  <rect class="bg-grp" x="410" y="264" width="196" height="118" rx="6"/>

    <text class="t-nd" x="507" y="303" text-anchor="middle">Short-term (context)</text>
  </g>
  <g class="ng n-agent" data-tip="Persistent episodic memory stored in a vector database. Enables recall across sessions.">

    <text class="t-nd" x="507" y="337" text-anchor="middle">Long-term (vector/episodic)</text>

  <g class="ng n-agent" data-tip="Structured store for in-flight task state, tool outputs, and intermediate results.">
    <rect x="420" y="354" width="174" height="26" rx="5"/>
    <text class="t-nd" x="507" y="371" text-anchor="middle">State store (tool outputs)</text>
  </g>

  <rect class="bg-grp" x="618" y="264" width="196" height="118" rx="6"/>
  <text class="t-grp lc-agent" x="628" y="279">Tooling layer</text>
  <g class="ng n-agent" data-tip="Connectors to internal enterprise systems: CRM, ERP, internal databases, document management.">
    <rect x="628" y="286" width="174" height="26" rx="5"/>
    <text class="t-nd" x="715" y="303" text-anchor="middle">Enterprise APIs (CRM, ERP)</text>
  </g>
  <g class="ng n-agent" data-tip="Connections to third-party and public APIs, web search, and external data services.">
    <rect x="628" y="320" width="174" height="26" rx="5"/>
    <text class="t-nd" x="715" y="337" text-anchor="middle">External APIs &amp; services</text>
  </g>
  <g class="ng n-agent" data-tip="Structured function/tool calling layer: schema definition, parameter validation, and response parsing.">
    <rect x="628" y="354" width="174" height="26" rx="5"/>
    <text class="t-nd" x="715" y="371" text-anchor="middle">Function calling layer</text>
  </g>

  <rect class="bg-grp" x="410" y="396" width="404" height="56" rx="6"/>
  <text class="t-grp lc-agent" x="420" y="411">Guardrails &amp; safety</text>
  <g class="ng n-agent" data-tip="Validate and sanitise all inputs before they reach the LLM or tools. Block prompt injection and malicious content.">
    <rect x="420" y="418" width="116" height="26" rx="5"/>
    <text class="t-nd" x="478" y="435" text-anchor="middle">Input validation</text>
  </g>
  <g class="ng n-agent" data-tip="Filter and inspect LLM outputs before delivery. Block toxicity, PII leakage, hallucinated facts.">
    <rect x="548" y="418" width="116" height="26" rx="5"/>
    <text class="t-nd" x="606" y="435" text-anchor="middle">Output filters</text>
  </g>
  <g class="ng n-agent" data-tip="Enforce organisational policies: data access rules, tool usage constraints, human approval gates.">
    <rect x="676" y="418" width="126" height="26" rx="5"/>
    <text class="t-nd" x="739" y="435" text-anchor="middle">Policy enforcement</text>
  </g>

<div id="tooltip"></div>

<script>
/* ── TOOLTIP ── */
const tip = document.getElementById('tooltip');
document.querySelectorAll('.ng[data-tip]').forEach(el => {
  el.addEventListener('mouseenter', () => {
    tip.textContent = el.getAttribute('data-tip');
    tip.style.opacity = '1';
  });
  el.addEventListener('mousemove', e => {
    let x = e.clientX + 14, y = e.clientY + 14;
    if (x + 290 > window.innerWidth)  x = e.clientX - 296;
    if (y + 70  > window.innerHeight) y = e.clientY - 64;
    tip.style.left = x + 'px';
    tip.style.top  = y + 'px';
  });
  el.addEventListener('mouseleave', () => { tip.style.opacity = '0'; });
});

/* ── SECTION FOCUS ── */
const sections = ['exp','rag','agent','llm','data','aiops','ctrl','gov'];
let focused = null;

function focusSection(id) {
  if (focused === id) { resetFocus(); return; }
  focused = id;
  sections.forEach(s => {
    const el = document.getElementById('sec-' + s);
    if (!el) return;
    if (s === id) {
      el.classList.remove('section-dimmed');
      el.classList.add('section-active');
    } else {
      el.classList.remove('section-active');
      el.classList.add('section-dimmed');
    }
  });
  // dim arrows when focused
  const arrows = document.getElementById('flow-arrows');
  if (arrows) { arrows.style.opacity = '0.35'; arrows.style.transition = 'opacity 0.25s'; }
}

function resetFocus() {
  focused = null;
  sections.forEach(s => {
    const el = document.getElementById('sec-' + s);
    if (!el) return;
    el.classList.remove('section-dimmed','section-active');
  });
  const arrows = document.getElementById('flow-arrows');
  if (arrows) { arrows.style.opacity = '1'; }
}

/* ── PAUSE / RESUME ANIMATION ── */
let animPaused = false;
function toggleAnim() {
  animPaused = !animPaused;
  const svg = document.querySelector('svg.arch');
  svg.style.animationPlayState = animPaused ? 'paused' : 'running';
  // pause all CSS animations inside SVG
  svg.querySelectorAll('*').forEach(el => {
    el.style.animationPlayState = animPaused ? 'paused' : 'running';
  });
  const btn = document.getElementById('btn-anim');
  btn.textContent = animPaused ? '▶ Resume flow' : '⏸ Pause flow';
  btn.classList.toggle('active', !animPaused);
}
</script>
