<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Agentic AI — Reference Architecture v4</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: #f5f6f8;
    min-height: 100vh;
    padding: 24px;
  }

  .page-header {
    max-width: 1500px;
    margin: 0 auto 16px auto;
    display: flex;
    align-items: baseline;
    gap: 16px;
  }
  .page-header h1 {
    font-size: 18px;
    font-weight: 600;
    color: #1a1a2e;
  }
  .page-header p {
    font-size: 12px;
    color: #6b7280;
  }

  .diagram-card {
    max-width: 1500px;
    margin: 0 auto;
    background: #ffffff;
    border-radius: 12px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.08), 0 4px 16px rgba(0,0,0,0.06);
    padding: 24px;
    overflow-x: auto;
  }

  svg.arch {
    display: block;
    min-width: 1460px;
  }

  /* SVG text styles */
  .t-outer { font-size: 13px; font-weight: 500; fill: #4b5563; font-family: inherit; }
  .t-sec   { font-size: 10px; font-weight: 600; font-family: inherit; }
  .t-grp   { font-size: 9px;  font-weight: 600; font-family: inherit; }
  .t-nd    { font-size: 10.5px; font-weight: 500; fill: #111827; font-family: inherit; }
  .t-sub   { font-size: 8.5px; font-weight: 400; fill: #6b7280; font-family: inherit; }
  .t-arr   { font-size: 8.5px; fill: #9ca3af; font-family: inherit; }

  /* section label colours */
  .lc-exp   { fill: #534AB7; }
  .lc-rag   { fill: #0F6E56; }
  .lc-agent { fill: #993C1D; }
  .lc-llm   { fill: #854F0B; }
  .lc-data  { fill: #5F5E5A; }
  .lc-aiops { fill: #3B6D11; }
  .lc-ctrl  { fill: #185FA5; }
  .lc-gov   { fill: #993556; }

  /* section backgrounds */
  .bg-exp   { fill: #EEF2FB; stroke: #7F77DD; stroke-width: 0.9; }
  .bg-rag   { fill: #E1F5EE; stroke: #1D9E75; stroke-width: 0.9; }
  .bg-agent { fill: #FAECE7; stroke: #D85A30; stroke-width: 0.9; }
  .bg-llm   { fill: #FAEEDA; stroke: #BA7517; stroke-width: 0.9; }
  .bg-data  { fill: #F1EFE8; stroke: #888780; stroke-width: 0.9; }
  .bg-aiops { fill: #EAF3DE; stroke: #639922; stroke-width: 0.9; }
  .bg-ctrl  { fill: #E6F1FB; stroke: #185FA5; stroke-width: 0.9; }
  .bg-gov   { fill: #FBEAF0; stroke: #993556; stroke-width: 0.9; }
  .bg-grp   { fill: rgba(255,255,255,0.5); stroke: rgba(0,0,0,0.08); stroke-width: 0.7; }
  .outer    { fill: none; stroke: #d1d5db; stroke-width: 1.2; }

  /* node styles by section */
  .n-exp   rect { fill: #ffffff; stroke: #7F77DD; stroke-width: 0.9; }
  .n-rag   rect { fill: #ffffff; stroke: #1D9E75; stroke-width: 0.9; }
  .n-agent rect { fill: #ffffff; stroke: #D85A30; stroke-width: 0.9; }
  .n-llm   rect { fill: #ffffff; stroke: #BA7517; stroke-width: 0.9; }
  .n-data  rect { fill: #ffffff; stroke: #888780; stroke-width: 0.9; }
  .n-aiops rect { fill: #ffffff; stroke: #639922; stroke-width: 0.9; }
  .n-ctrl  rect { fill: #ffffff; stroke: #185FA5; stroke-width: 0.9; }
  .n-gov   rect { fill: #ffffff; stroke: #993556; stroke-width: 0.9; }
  .n-opt   rect { fill: #ffffff; stroke: #BA7517; stroke-width: 0.9; stroke-dasharray: 5 3; }

  .opt-tag { font-size: 7.5px; font-weight: 500; fill: #854F0B; font-family: inherit; }

  .ng { cursor: pointer; }
  .ng:hover rect { opacity: 0.78; transition: opacity 0.15s; }
  .ng:hover .t-nd { fill: #1d4ed8; }

  /* tooltip */
  #tooltip {
    position: fixed;
    background: #1f2937;
    color: #f9fafb;
    font-size: 12px;
    padding: 6px 10px;
    border-radius: 6px;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.15s;
    max-width: 260px;
    line-height: 1.5;
    z-index: 100;
  }

  .print-note {
    max-width: 1500px;
    margin: 12px auto 0 auto;
    font-size: 11px;
    color: #9ca3af;
    text-align: right;
  }

  @media print {
    body { background: white; padding: 0; }
    .diagram-card { box-shadow: none; border-radius: 0; }
    #tooltip { display: none; }
    .print-note { display: none; }
  }
</style>
</head>

<!-- Tooltip -->
<div id="tooltip"></div>

<script>
  const tooltip = document.getElementById('tooltip');
  document.querySelectorAll('.ng[data-tip]').forEach(el => {
    el.addEventListener('mouseenter', e => {
      tooltip.textContent = el.getAttribute('data-tip');
      tooltip.style.opacity = '1';
    });
    el.addEventListener('mousemove', e => {
      let x = e.clientX + 14, y = e.clientY + 14;
      if (x + 270 > window.innerWidth) x = e.clientX - 280;
      if (y + 60 > window.innerHeight) y = e.clientY - 60;
      tooltip.style.left = x + 'px';
      tooltip.style.top  = y + 'px';
    });
    el.addEventListener('mouseleave', () => {
      tooltip.style.opacity = '0';
    });
  });
</script>
